<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumixApp</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="LumixApp.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore, collection, addDoc, getDocs,
            getDoc,
            doc,
            updateDoc,
            deleteDoc,
            query,
            where
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyCaN3c_2RRj_8Pa2x09lx2w1uLyI88cqQA",
            authDomain: "lumixevents.firebaseapp.com",
            projectId: "lumixevents",
            storageBucket: "lumixevents.firebasestorage.app",
            messagingSenderId: "65335614935",
            appId: "1:65335614935:web:4398149204e003da627f92",
            measurementId: "G-XBN0S1SSKD"
        };

        let app, db, storage, auth;
        try {
            if (Object.keys(firebaseConfig).length > 0) {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                storage = getStorage(app);
                auth = getAuth(app);
            } else {
                console.warn("Firebase config is empty. Please add your config for the app to work.");
            }
        } catch (e) {
            console.error("Firebase initialization failed:", e);
        }

        window.firebaseAuth =
        {
            signIn: async (email, password) => {
                try {
                    const userInfo = await signInWithEmailAndPassword(auth, email, password);
                    // Track user for Admin Panel
                    if (db) {
                        try {
                            const userRef = doc(db, "users", email);
                            const snap = await getDoc(userRef);
                            if (!snap.exists()) {
                                await collection(db, "users");
                                await addDoc(collection(db, "users"), { email: email, role: email.toLowerCase() === 'admin@lumix.edu' ? 'Admin' : 'Student', created: new Date().toISOString() });
                            }
                        } catch (err) { console.log(err); }
                    }
                    return { success: true, email: userInfo.user.email };
                } catch (e) {
                    return { success: false, error: e.message };
                }
            },
            logout: async () => {
                await signOut(auth);
            },
            getUser: () => {
                return auth && auth.currentUser ? { email: auth.currentUser.email } : null;
            }
        };

        window.firebaseInterop =
        {
            saveEvent: async (eventData) => {
                try {
                    const docref = await addDoc(collection(db, "events"), eventData);
                    return { success: true, id: docref.id };
                } catch (e) {
                    return { success: false, error: e.message };
                }
            },
            getEvents: async () => {
                try {
                    if (!db) return [];
                    const querySnap = await getDocs(collection(db, "events"));
                    return querySnap.docs.map(doc => ({ ...doc.data(), Id: doc.id }));
                } catch (e) {
                    console.error("Error getting events:", e);
                    return [];
                }
            },
            getEventById: async (id) => {
                try {
                    const docRef = doc(db, "events", id);
                    const docSnap = await getDoc(docRef);
                    return docSnap.exists() ? { id: docSnap.id, ...docSnap.data() } : null;
                } catch (e) {
                    return null;
                }
            },
            updateEvent: async (id, eventData) => {
                try {
                    const docRef = doc(db, "events", id)
                    await updateDoc(docRef, eventData);
                    return { success: true }
                } catch (e) {
                    return { success: false, error: e.message };
                }
            },
            deleteEvent: async (id) => {
                try {
                    await deleteDoc(doc(db, "events", id));
                    return { success: true }
                } catch (e) {
                    return { success: false, error: e.message }
                }
            },
            saveRSVP: async (rsvpData) => {
                try {
                    const docref = await addDoc(collection(db, "rsvps"), rsvpData);
                    return { success: true, id: docref.id };
                } catch (e) {
                    throw new Error(e.message);
                }
            },
            saveFeedback: async (feedbackData) => {
                try {
                    const docref = await addDoc(collection(db, "feedback"), feedbackData);
                    return { success: true, id: docref.id };
                } catch (e) {
                    throw new Error(e.message);
                }
            },
            getAllRSVPs: async () => {
                if (!db) return [];
                try {
                    const querySnap = await getDocs(collection(db, "rsvps"));
                    return querySnap.docs.map(doc => ({ ...doc.data(), Id: doc.id }));
                } catch (e) { return []; }
            },
            getAllFeedback: async () => {
                if (!db) return [];
                try {
                    const querySnap = await getDocs(collection(db, "feedback"));
                    return querySnap.docs.map(doc => ({ ...doc.data(), Id: doc.id }));
                } catch (e) { return []; }
            },
            checkDuplicateFeedback: async (eventId, studentId) => {
                try {
                    const q = query(
                        collection(db, "feedback"),
                        where("EventId", "==", eventId),
                        where("StudentId", "==", studentId)
                    );
                    const querySnap = await getDocs(q);
                    return !querySnap.empty;
                } catch (e) {
                    console.error("Error checking duplicate feedback:", e);
                    return false;
                }
            },
            getAllUsers: async () => {
                if (!db) return [];
                try {
                    const querySnap = await getDocs(collection(db, "users"));
                    return querySnap.docs.map(doc => ({ ...doc.data(), Id: doc.id }));
                } catch (e) { return []; }
            },
            deleteUser: async (id) => {
                try {
                    await deleteDoc(doc(db, "users", id));
                    return { success: true }
                } catch (e) {
                    return { success: false, error: e.message }
                }
            },
            deleteRSVP: async (id) => {
                console.log("Deleting RSVP with ID:", id);
                if (!id) {
                    console.error("Delete failed: ID is null or undefined");
                    return { success: false, error: "ID is null or undefined" };
                }
                try {
                    await deleteDoc(doc(db, "rsvps", id));
                    console.log("Delete successful for ID:", id);
                    return { success: true }
                } catch (e) {
                    console.error("Delete failed for ID:", id, e);
                    return { success: false, error: e.message }
                }
            },
            updateRSVPAttendance: async (id, status) => {
                try {
                    const docRef = doc(db, "rsvps", id);
                    await updateDoc(docRef, { IsAttended: status });
                    return { success: true };
                } catch (e) {
                    return { success: false, error: e.message };
                }
            },
            registerAuthStateListener: (dotNetHelper) => {
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        dotNetHelper.invokeMethodAsync('OnAuthStateChanged', user.email);
                    } else {
                        dotNetHelper.invokeMethodAsync('OnAuthStateChanged', null);
                    }
                });
            }
        };

    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
